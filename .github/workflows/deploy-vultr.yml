name: 🚀 Deploy to Vultr VPS (Zero Downtime)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # Permet le déploiement manuel

env:
  APP_PATH: /var/www/axontis
  RELEASES_PATH: /var/www/axontis-releases
  PHP_VERSION: '8.3'
  NODE_VERSION: '22'

jobs:
  # =============================================================================
  # Job 0: Test Migrations (SQLite)
  # =============================================================================
  test-migrations:
    name: 🧪 Test Migrations
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, intl, zip, bcmath, gd, pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: 📦 Install Composer dependencies
        run: composer install --prefer-dist --no-interaction

      - name: 🗄️ Test migrations on MySQL (Docker)
        run: |
          echo "🧪 Testing migrations on MySQL with Docker..."
          echo ""

          # Démarrer un conteneur MySQL temporaire
          echo "🐳 Starting MySQL container..."
          docker run -d \
            --name mysql-test \
            -e MYSQL_ROOT_PASSWORD=testpassword \
            -e MYSQL_DATABASE=axontis_test \
            -p 33306:3306 \
            mysql:8.0 \
            --default-authentication-plugin=mysql_native_password

          # Attendre que MySQL soit complètement initialisé
          echo "⏳ Waiting for MySQL to be ready..."
          sleep 5  # Attendre que le conteneur démarre

          for i in {1..30}; do
            # Vérifier si MySQL accepte les connexions
            if docker exec mysql-test mysql -uroot -ptestpassword -e "SELECT 1;" &>/dev/null; then
              echo "✅ MySQL is ready!"
              break
            fi
            echo "   Attempt $i/30..."
            sleep 3
          done

          # Vérifier la connexion finale
          if ! docker exec mysql-test mysql -uroot -ptestpassword -e "SHOW DATABASES;" 2>/dev/null; then
            echo "❌ MySQL connection failed!"
            echo "Container logs:"
            docker logs mysql-test 2>&1 | tail -20
            docker stop mysql-test
            docker rm mysql-test
            exit 1
          fi

          echo "✅ MySQL connection verified"

          echo ""
          echo "📥 Importing existing MySQL schema..."

          # Importer le schéma existant depuis database/schema/mysql-schema.sql
          if [ -f "database/schema/mysql-schema.sql" ]; then
            docker exec -i mysql-test mysql -uroot -ptestpassword axontis_test < database/schema/mysql-schema.sql

            if [ $? -eq 0 ]; then
              echo "✅ Schema imported successfully"
            else
              echo "⚠️  Schema import had warnings (this is normal for conditional statements)"
            fi
          else
            echo "⚠️  No existing schema found, starting from scratch"
          fi

          echo ""
          echo "📋 Tables in database before migrations:"
          docker exec mysql-test mysql -uroot -ptestpassword axontis_test -e "SHOW TABLES;"

          # Configurer l'environnement de test
          cp .env.example .env.testing
          php artisan key:generate --env=testing

          # Configurer MySQL dans .env.testing
          cat >> .env.testing << EOF

          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=33306
          DB_DATABASE=axontis_test
          DB_USERNAME=root
          DB_PASSWORD=testpassword
          EOF

          echo ""
          echo "🗄️ Running pending migrations..."

          # Marquer les migrations existantes comme déjà exécutées
          # (car elles sont dans le schéma importé)
          php artisan migrate:install --env=testing

          # Obtenir la liste des migrations déjà dans le schéma
          # et les marquer comme exécutées
          echo "Marking existing migrations as run..."
          php artisan tinker --env=testing --execute="
            // Récupérer toutes les migrations
            \$migrator = app('migrator');
            \$files = \$migrator->getMigrationFiles(\$migrator->paths());

            // Marquer uniquement les anciennes migrations (avant 2024_01_15)
            foreach (\$files as \$name => \$path) {
              if (strpos(\$name, '2024_01_15') === false) {
                DB::table('migrations')->insertOrIgnore([
                  'migration' => \$name,
                  'batch' => 1
                ]);
                echo \"Marked: \$name\n\";
              }
            }
          " 2>/dev/null || echo "Could not mark old migrations"

          echo ""
          echo "Running NEW migrations only..."
          php artisan migrate --env=testing --force --no-interaction

          if [ $? -eq 0 ]; then
            echo "✅ Migrations executed successfully"
          else
            echo "❌ Migrations failed!"
            docker logs mysql-test
            docker stop mysql-test
            docker rm mysql-test
            exit 1
          fi

          # Tester le rollback des nouvelles migrations uniquement
          echo ""
          echo "Testing rollback of new migrations..."
          php artisan migrate:rollback --env=testing --force --no-interaction --step=1

          if [ $? -eq 0 ]; then
            echo "✅ Rollback successful"
          else
            echo "❌ Rollback failed!"
            docker stop mysql-test
            docker rm mysql-test
            exit 1
          fi

          # Re-tester les migrations (pour vérifier l'idempotence)
          echo ""
          echo "Re-testing migrations (idempotence check)..."
          php artisan migrate --env=testing --force --no-interaction

          if [ $? -eq 0 ]; then
            echo "✅ Migrations are idempotent"
          else
            echo "❌ Migrations failed on second run!"
            docker stop mysql-test
            docker rm mysql-test
            exit 1
          fi

          # Afficher le schéma final
          echo ""
          echo "📋 Final database schema:"
          docker exec mysql-test mysql -uroot -ptestpassword axontis_test -e "SHOW TABLES;"

          echo ""
          echo "📊 Checking critical tables:"
          docker exec mysql-test mysql -uroot -ptestpassword axontis_test -e "DESCRIBE communications;" || echo "⚠️  communications table check"
          docker exec mysql-test mysql -uroot -ptestpassword axontis_test -e "DESCRIBE notification_preferences;" || echo "⚠️  notification_preferences table check"

          # Nettoyer
          echo ""
          echo "🧹 Cleaning up..."
          docker stop mysql-test
          docker rm mysql-test

          echo ""
          echo "🎉 All migration tests passed!"

  # =============================================================================
  # Job 1: Build & Deploy (Zero Downtime)
  # =============================================================================
  deploy:
    name: 🚀 Build & Deploy to Vultr (Zero Downtime)
    runs-on: ubuntu-latest
    needs: test-migrations  # Ne déployer que si les tests passent

    steps:
      # =========================================================================
      # 1. CHECKOUT & SETUP
      # =========================================================================
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, intl, zip, bcmath, gd, pdo, pdo_mysql, fileinfo
          coverage: none

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # =========================================================================
      # 2. BUILD
      # =========================================================================
      - name: 🔧 Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist

      # =========================================================================
      # ⚠️  CORRECTION: Le .env doit exister AVANT npm run build
      #     pour que Vite injecte les VITE_* dans les assets compilés.
      #     On crée un .env minimaliste avec uniquement les variables Vite.
      # =========================================================================
      - name: ⚙️ Create .env for Vite build (VITE_* variables)
        run: |
          cat > .env << EOF
          VITE_REVERB_APP_KEY=${{ secrets.REVERB_APP_KEY }}
          VITE_REVERB_HOST=${{ secrets.REVERB_HOST }}
          VITE_REVERB_PORT=${{ secrets.REVERB_PORT }}
          VITE_REVERB_SCHEME=${{ secrets.REVERB_SCHEME }}
          EOF
          sed -i 's/^          //' .env
          echo "✅ .env créé pour Vite ($(wc -l < .env) variables VITE_*)"
          echo "   VITE_REVERB_APP_KEY=$(grep VITE_REVERB_APP_KEY .env | cut -d= -f2 | head -c 8)..."

      - name: 🔧 Install Node dependencies & Build assets
        run: |
          npm ci
          npm run build

      # =========================================================================
      # 3. CREATE PRODUCTION ENV FILE (complet — uploadé sur le serveur)
      # =========================================================================
      - name: ⚙️ Create production env file
        run: |
          cat > .env.production << 'EOF'
          APP_ENV=production
          APP_DEBUG=false
          APP_KEY=${{ secrets.APP_KEY }}
          APP_NAME=${{ secrets.APP_NAME }}
          APP_URL=${{ secrets.APP_URL }}
          DB_CONNECTION=mysql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          CACHE_DRIVER=redis
          SESSION_DRIVER=redis
          QUEUE_CONNECTION=redis
          REDIS_CLIENT=phpredis
          REDIS_HOST=127.0.0.1
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          REDIS_PORT=6379
          REDIS_DB=0
          REDIS_CACHE_DB=1
          REDIS_SESSION_DB=2
          REDIS_QUEUE_DB=3
          FILESYSTEM_DISK=${{ secrets.FILESYSTEM_DISK }}
          CLOUDFLARE_R2_ACCESS_KEY_ID=${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY=${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_BUCKET=${{ secrets.CLOUDFLARE_R2_BUCKET }}
          CLOUDFLARE_R2_ENDPOINT=${{ secrets.CLOUDFLARE_R2_ENDPOINT }}
          CLOUDFLARE_R2_URL=${{ secrets.CLOUDFLARE_R2_URL }}
          DOCUSIGN_CLIENT_ID=${{ secrets.DOCUSIGN_CLIENT_ID }}
          DOCUSIGN_USER_ID=${{ secrets.DOCUSIGN_USER_ID }}
          DOCUSIGN_ACCOUNT_ID=${{ secrets.DOCUSIGN_ACCOUNT_ID }}
          DOCUSIGN_BASE_PATH=${{ secrets.DOCUSIGN_BASE_PATH }}
          DOCUSIGN_OAUTH_BASE_PATH=${{ secrets.DOCUSIGN_OAUTH_BASE_PATH }}
          DOCUSIGN_HMAC_KEY=${{ secrets.DOCUSIGN_HMAC_KEY }}
          STRIPE_PUBLIC_KEY=${{ secrets.STRIPE_PUBLIC_KEY }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          SENTRY_LARAVEL_DSN=${{ secrets.SENTRY_LARAVEL_DSN }}
          MAIL_MAILER=${{ secrets.MAIL_MAILER }}
          MAIL_HOST=${{ secrets.MAIL_HOST }}
          MAIL_PORT=${{ secrets.MAIL_PORT }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM_ADDRESS=${{ secrets.MAIL_FROM_ADDRESS }}
          MAIL_FROM_NAME=${{ secrets.MAIL_FROM_NAME }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          MAILGUN_DOMAIN=${{ secrets.MAILGUN_DOMAIN }}
          MAILGUN_SECRET=${{ secrets.MAILGUN_SECRET }}
          MAILGUN_ENDPOINT=${{ secrets.MAILGUN_ENDPOINT }}
          BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
          TWILIO_SID=${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN=${{ secrets.TWILIO_TOKEN }}
          TWILIO_FROM=${{ secrets.TWILIO_FROM }}
          TWILIO_WHATSAPP_FROM=${{ secrets.TWILIO_WHATSAPP_FROM }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
          NOTIFICATION_SLACK_WEBHOOK=${{ secrets.NOTIFICATION_SLACK_WEBHOOK }}
          NOTIFICATION_TELEGRAM_CHAT_ID=${{ secrets.NOTIFICATION_TELEGRAM_CHAT_ID }}
          BROADCAST_CONNECTION=reverb
          BROADCAST_DRIVER=reverb
          REVERB_APP_ID=${{ secrets.REVERB_APP_ID }}
          REVERB_APP_KEY=${{ secrets.REVERB_APP_KEY }}
          REVERB_APP_SECRET=${{ secrets.REVERB_APP_SECRET }}
          REVERB_HOST=${{ secrets.REVERB_HOST }}
          REVERB_PORT=${{ secrets.REVERB_PORT }}
          REVERB_SCHEME=${{ secrets.REVERB_SCHEME }}
          VITE_REVERB_APP_KEY=${{ secrets.REVERB_APP_KEY }}
          VITE_REVERB_HOST=${{ secrets.REVERB_HOST }}
          VITE_REVERB_PORT=${{ secrets.REVERB_PORT }}
          VITE_REVERB_SCHEME=${{ secrets.REVERB_SCHEME }}
          HPP_ARC_ID=${{ secrets.HPP_ARC_ID }}
          HPP_ARC_KEY=${{ secrets.HPP_ARC_KEY }}
          HPP_API_BASE_URL=${{ secrets.HPP_API_BASE_URL }}
          HIKVISION_DEDUPLICATE_WINDOW=60
          HIKVISION_EVENT_RETENTION_DAYS=365
          ALARM_EVENTS_QUEUE=alarm-events
          EOF
          # Supprimer l'indentation introduite par le heredoc YAML
          sed -i 's/^          //' .env.production
          echo "✅ Fichier .env.production créé ($(wc -l < .env.production) lignes)"

      # =========================================================================
      # 4. CREATE RELEASE ARCHIVE
      # =========================================================================
      - name: 🗂️ Create release archive
        run: |
          set +e
          tar -czf release.tar.gz \
            --exclude='release.tar.gz' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='.env.example' \
            --exclude='.env.production.example' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/data/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            .
          TAR_EXIT=$?
          set -e
          if [ $TAR_EXIT -ge 2 ]; then
            echo "❌ tar failed with exit code $TAR_EXIT"
            exit $TAR_EXIT
          fi
          echo "✅ Archive created successfully"

      # =========================================================================
      # 5. SSH SETUP
      # =========================================================================
      - name: 🔐 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VULTR_SSH_PRIVATE_KEY }}

      - name: 📋 Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VULTR_HOST }} >> ~/.ssh/known_hosts

      - name: 🔍 Test SSH connection
        run: |
          echo "Testing SSH connection to ${{ secrets.VULTR_USER }}@${{ secrets.VULTR_HOST }}..."
          ssh -o BatchMode=yes -o ConnectTimeout=10 -v ${{ secrets.VULTR_USER }}@${{ secrets.VULTR_HOST }} "echo 'SSH connection successful'" || {
            echo "❌ SSH connection failed!"
            echo ""
            echo "Please ensure following public key is added to ~/.ssh/authorized_keys on your Vultr server:"
            ssh-add -L
            exit 1
          }

      # =========================================================================
      # 6. UPLOAD TO SERVER (release + env)
      # =========================================================================
      - name: 📤 Upload release & env to server
        run: |
          scp release.tar.gz ${{ secrets.VULTR_USER }}@${{ secrets.VULTR_HOST }}:/tmp/release.tar.gz
          # Créer les dossiers shared sur le serveur s'ils n'existent pas encore
          ssh ${{ secrets.VULTR_USER }}@${{ secrets.VULTR_HOST }} "mkdir -p /var/www/axontis-shared /var/www/axontis-shared/storage/keys"
          # Uploader le .env de production directement dans SHARED_PATH
          scp .env.production ${{ secrets.VULTR_USER }}@${{ secrets.VULTR_HOST }}:/var/www/axontis-shared/.env
          echo "✅ Archive et .env uploadés sur le serveur"
          # NOTE: La clé DocuSign (storage/keys/docusign_key.key) est placée manuellement
          # une seule fois sur le serveur dans /var/www/axontis-shared/storage/keys/
          # Elle persiste entre toutes les releases via le symlink storage partagé.

      # =========================================================================
      # 7. ZERO DOWNTIME DEPLOYMENT
      # =========================================================================
      - name: 🚀 Deploy on server (Zero Downtime)
        env:
          VULTR_USER: ${{ secrets.VULTR_USER }}
          VULTR_HOST: ${{ secrets.VULTR_HOST }}
        run: |
          ssh $VULTR_USER@$VULTR_HOST /bin/bash << 'DEPLOY_SCRIPT'
          set -e

          echo "=========================================="
          echo "🚀 ZERO DOWNTIME DÉPLOIEMENT AXONTIS"
          echo "📅 $(date)"
          echo "=========================================="

          APP_PATH="/var/www/axontis"
          RELEASES_PATH="/var/www/axontis-releases"
          CURRENT_LINK="$APP_PATH"
          SHARED_PATH="/var/www/axontis-shared"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          NEW_RELEASE="$RELEASES_PATH/$TIMESTAMP"

          # Créer les dossiers nécessaires
          mkdir -p $RELEASES_PATH
          mkdir -p $SHARED_PATH/storage/{app,framework,logs,keys}

          # ============================================
          # 1. EXTRACTION DU NOUVEAU CODE
          # ============================================
          echo ""
          echo "📥 Extraction du nouveau code..."
          mkdir -p $NEW_RELEASE
          cd $NEW_RELEASE
          tar -xzf /tmp/release.tar.gz
          rm -f /tmp/release.tar.gz
          echo "✅ Code extrait"

          # ============================================
          # 2. VÉRIFICATION DU DOSSIER RESOURCES
          # ============================================
          echo ""
          echo "📋 Vérification du dossier resources..."
          # Resources doivent être incluses dans chaque release (pas partagées)
          if [ -d "$NEW_RELEASE/resources" ]; then
            echo "✅ Dossier resources présent dans la release"
            # Lister les sous-dossiers pour confirmer
            echo "   - Contenu: $(ls -1 $NEW_RELEASE/resources | tr '\n' ' ')"
          else
            echo "❌ ERREUR: Le dossier resources n'est pas présent dans la release!"
            echo "   Vérifiez que l'archive tar contient bien le dossier resources"
            rm -rf $NEW_RELEASE
            exit 1
          fi

          # ============================================
          # 3. SYMLINKS POUR STORAGE (partagé entre releases)
          # ============================================
          echo ""
          echo "🔗 Configuration du symlink storage partagé..."
          mkdir -p $SHARED_PATH/storage/{app,framework/{cache,sessions,views},logs,keys}
          # S'assurer que la clé DocuSign a les bonnes permissions (lecture seule pour www-data)
          if [ -f "$SHARED_PATH/storage/keys/docusign_key.key" ]; then
            chown www-data:www-data $SHARED_PATH/storage/keys/docusign_key.key
            chmod 640 $SHARED_PATH/storage/keys/docusign_key.key
            echo "✅ Clé DocuSign présente dans le storage partagé"
          else
            echo "❌ ERREUR CRITIQUE: Clé DocuSign manquante dans $SHARED_PATH/storage/keys/docusign_key.key"
            echo "   → Placez la clé manuellement une seule fois avec la commande suivante :"
            echo "   scp docusign_private.key user@serveur:/var/www/axontis-shared/storage/keys/docusign_key.key"
            rm -rf $NEW_RELEASE
            exit 1
          fi
          rm -rf $NEW_RELEASE/storage
          ln -sf $SHARED_PATH/storage $NEW_RELEASE/storage
          echo "✅ Symlink storage configuré"

          # ============================================
          # 4. CONFIGURATION DU .ENV
          # ============================================
          echo ""
          echo "⚙️ Configuration de l'environnement..."

          # Le .env de production a été uploadé par SCP dans SHARED_PATH avant ce script.
          # On le copie simplement dans la nouvelle release.
          if [ -f "$SHARED_PATH/.env" ]; then
            cp $SHARED_PATH/.env $NEW_RELEASE/.env
            echo "✅ .env copié depuis $SHARED_PATH/.env"
          else
            echo "❌ ERREUR: $SHARED_PATH/.env introuvable!"
            echo "   Le fichier .env.production n'a pas été uploadé correctement."
            rm -rf $NEW_RELEASE
            exit 1
          fi

          echo "✅ .env configuré"

          # ============================================
          # 5. INSTALLATION DES DÉPENDANCES
          # ============================================
          echo ""
          echo "📦 Installation des dépendances..."
          cd $NEW_RELEASE

          # Installation fraîche des dépendances (ne pas copier vendor pour éviter les problèmes de permissions)
          echo "Installation des dépendances avec Composer..."

          # Corriger les permissions du dossier de release (créé par root lors de l'extraction)
          chown -R www-data:www-data $NEW_RELEASE
          chmod -R 755 $NEW_RELEASE

          # Supprimer le dossier vendor s'il existe (créé par root lors de l'extraction)
          sudo -u www-data rm -rf $NEW_RELEASE/vendor 2>/dev/null || rm -rf $NEW_RELEASE/vendor

          # Lancer composer install en tant que www-data
          sudo -u www-data composer install --no-dev --optimize-autoloader --no-interaction
          echo "✅ Dépendances installées"

          # ============================================
          # 6. OPTIMISATIONS LARAVEL (DANS LE DOSSIER TEMPORAIRE)
          # ============================================
          echo ""
          echo "⚡ Optimisation de Laravel..."

          # Publier les vues vendor mail si nécessaire
          if [ ! -d "$NEW_RELEASE/resources/views/vendor/mail" ]; then
            php artisan vendor:publish --tag=laravel-mail --force
          fi

          # Créer le storage:link
          php artisan storage:link

          echo "✅ Optimisation terminée"

          # ============================================
          # 7. VÉRIFICATION DE LA NOUVELLE RELEASE
          # ============================================
          echo ""
          echo "🔍 Vérification de la nouvelle release..."

          # Test des fichiers critiques
          CRITICAL_FILES=("artisan" "public/index.php" ".env" "vendor/autoload.php" "resources/views")
          ALL_OK=true
          for file in "${CRITICAL_FILES[@]}"; do
            if [ ! -f "$NEW_RELEASE/$file" ] && [ ! -d "$NEW_RELEASE/$file" ]; then
              echo "❌ Fichier/dossier critique manquant: $file"
              ALL_OK=false
            fi
          done

          if [ "$ALL_OK" = false ]; then
            echo "❌ La nouvelle release n'est pas complète"
            rm -rf $NEW_RELEASE
            exit 1
          fi

          # Test de connexion BDD
          if ! php artisan tinker --execute="try { DB::connection()->getPdo(); echo 'OK'; } catch(\Exception \$e) { echo 'FAIL: '.\$e->getMessage(); }" 2>/dev/null | grep -q "OK"; then
            echo "❌ Impossible de se connecter à la base de données"
            rm -rf $NEW_RELEASE
            exit 1
          fi
          echo "✅ Connexion BDD OK"

          # ============================================
          # 8. MIGRATIONS
          # ============================================
          echo ""
          echo "🗄️ Exécution des migrations..."
          php artisan migrate --seed
          echo "✅ Migrations exécutées"

          # ============================================
          # 9. CHANGEMENT ATOMIQUE DU SYMLINK (ZERO DOWNTIME)
          # ============================================
          echo ""
          echo "🔄 Switch vers la nouvelle release (ATOMIQUE)..."

          # Créer le symlink de manière atomique
          ln -sfn $NEW_RELEASE $CURRENT_LINK

          echo "✅ Symlink mis à jour"

          # ============================================
          # 10. NETTOYAGE DU CACHE ET REDÉMARRAGE SERVICES
          # ============================================
          echo ""
          echo "🔄 Nettoyage du cache et redémarrage des services..."

          # Note: Après le switch du symlink, il faut IMPÉRATIVEMENT re-cacher
          # la configuration depuis /var/www/axontis pour que Laravel
          # charge les bonnes variables d'environnement.

          # Nettoyage Redis (DB 1 uniquement)
          if systemctl is-active --quiet redis-server; then
            echo "🗑️ Nettoyage du cache Redis (DB 1 uniquement)..."
            if [ -n "$REDIS_PASSWORD" ] && [ "$REDIS_PASSWORD" != "null" ]; then
              redis-cli -a "$REDIS_PASSWORD" -n 1 FLUSHDB --no-auth-warning >/dev/null 2>&1 || true
            else
              redis-cli -n 1 FLUSHDB >/dev/null 2>&1 || true
            fi
            echo "✅ Cache Redis vidé (sessions et queues préservées)"
          fi

          # Nettoyer TOUS les caches Laravel
          echo ""
          echo "🗑️ Nettoyage complet des caches Laravel..."
          cd $CURRENT_LINK && php artisan optimize:clear

          # Reload PHP-FPM pour vider l'opcache
          echo "🔄 Rechargement PHP-FPM..."
          systemctl reload php8.3-fpm

          # IMPORTANT: Attendre que PHP-FPM se recharge complètement
          sleep 2

          # Re-créer les caches avec les BONNES variables d'environnement
          echo ""
          echo "⚡ Re-création des caches avec le nouveau contexte..."


          cd $CURRENT_LINK && php artisan config:cache
          cd $CURRENT_LINK && php artisan route:cache
          cd $CURRENT_LINK && php artisan view:cache
          cd $CURRENT_LINK && php artisan event:cache

          echo "✅ Optimisation finale terminée"

          # Redémarrer Horizon (graceful terminate — Supervisor le relance automatiquement)
          # horizon:terminate envoie SIGTERM : chaque worker finit son job en cours
          # avant de s'arrêter. Aucun job n'est interrompu ni perdu.
          # Les jobs en file d'attente restent dans Redis, intacts.
          echo ""
          echo "🔄 Redémarrage gracieux de Horizon..."
          cd $CURRENT_LINK && php artisan horizon:terminate 2>/dev/null || true

          # Attendre que Horizon s'arrête VRAIMENT (max 60s pour les jobs longs)
          echo "⏳ Attente de l'arrêt gracieux des workers (jobs en cours terminent)..."
          HORIZON_STOPPED=false
          for i in $(seq 1 60); do
            HORIZON_CHECK=$(cd $CURRENT_LINK && php artisan horizon:status 2>&1 || echo "inactive")
            if echo "$HORIZON_CHECK" | grep -qi "inactive\|not running"; then
              echo "✅ Horizon arrêté proprement après ${i}s (tous les jobs en cours terminés)"
              HORIZON_STOPPED=true
              break
            fi
            # Afficher un message toutes les 10 secondes
            if [ $((i % 10)) -eq 0 ]; then
              echo "   ⏳ ${i}s — workers terminent leurs jobs en cours..."
            fi
            sleep 1
          done

          if [ "$HORIZON_STOPPED" = false ]; then
            echo "⚠️ Horizon met plus de 60s à s'arrêter (jobs très longs en cours)"
            echo "   Les jobs en cours vont terminer. Aucune perte de données."
          fi

          # Supervisor relance Horizon automatiquement avec le nouveau code
          sleep 2
          HORIZON_STATUS=$(supervisorctl status axontis-horizon 2>/dev/null | grep -c "RUNNING" || echo "0")
          if [ "$HORIZON_STATUS" -gt 0 ] 2>/dev/null; then
            echo "✅ Horizon redémarré avec succès par Supervisor"
          else
            echo "⚠️ Horizon en cours de redémarrage..."
            supervisorctl start axontis-horizon 2>/dev/null || true
            sleep 3
            HORIZON_STATUS=$(supervisorctl status axontis-horizon 2>/dev/null | grep -c "RUNNING" || echo "0")
            if [ "$HORIZON_STATUS" -gt 0 ] 2>/dev/null; then
              echo "✅ Horizon démarré manuellement"
            else
              echo "❌ Horizon ne démarre pas — vérifiez les logs : tail -50 /var/www/axontis/storage/logs/horizon.log"
            fi
          fi

          echo "✅ Services redémarrés (aucun job perdu)"

          # ============================================
          # 10b. REDÉMARRAGE DE REVERB (WebSocket)
          # ============================================
          echo ""
          echo "🔄 Redémarrage de Reverb (WebSocket server)..."
          REVERB_STATUS=$(supervisorctl status axontis-reverb 2>/dev/null | grep -c "RUNNING" || echo "0")
          if [ "$REVERB_STATUS" -gt 0 ] 2>/dev/null; then
            echo "   Reverb actif — restart gracieux..."
            supervisorctl restart axontis-reverb 2>/dev/null || true
            sleep 2
            REVERB_CHECK=$(supervisorctl status axontis-reverb 2>/dev/null | grep -c "RUNNING" || echo "0")
            if [ "$REVERB_CHECK" -gt 0 ] 2>/dev/null; then
              echo "✅ Reverb redémarré avec succès"
            else
              echo "⚠️ Reverb ne répond pas après restart — vérifiez les logs"
            fi
          else
            echo "   Reverb pas encore configuré dans Supervisor — tentative de démarrage..."
            # Copier le fichier de config Supervisor si disponible
            if [ -f "$CURRENT_LINK/infrastructure/scripts/axontis-reverb.conf" ]; then
              cp "$CURRENT_LINK/infrastructure/scripts/axontis-reverb.conf" /etc/supervisor/conf.d/axontis-reverb.conf 2>/dev/null || true
              supervisorctl reread 2>/dev/null || true
              supervisorctl update 2>/dev/null || true
              supervisorctl start axontis-reverb 2>/dev/null || true
              sleep 2
              REVERB_CHECK=$(supervisorctl status axontis-reverb 2>/dev/null | grep -c "RUNNING" || echo "0")
              if [ "$REVERB_CHECK" -gt 0 ] 2>/dev/null; then
                echo "✅ Reverb démarré pour la première fois"
              else
                echo "⚠️ Reverb n'a pas démarré — config manuelle requise"
                echo "   → Copiez infrastructure/scripts/axontis-reverb.conf dans /etc/supervisor/conf.d/"
                echo "   → Puis : sudo supervisorctl reread && sudo supervisorctl update && sudo supervisorctl start axontis-reverb"
              fi
            else
              echo "⚠️ Fichier axontis-reverb.conf non trouvé — Reverb non configuré"
            fi
          fi

          # ============================================
          # 11. NETTOYAGE DES ANCIENNES RELEASES
          # ============================================
          echo ""
          echo "🧹 Nettoyage des anciennes releases..."
          cd $RELEASES_PATH
          ls -t | tail -n +4 | xargs -r rm -rf --
          echo "✅ Anciennes releases nettoyées"

          # ============================================
          # 12. PERMISSIONS
          # ============================================
          echo ""
          echo "🔒 Configuration des permissions..."
          chown -R www-data:www-data $NEW_RELEASE
          chmod -R 755 $NEW_RELEASE
          chmod -R 775 $SHARED_PATH/storage

          echo "✅ Permissions configurées"

          # ============================================
          # 13. VÉRIFICATION ET CORRECTION NGINX (CORRIGÉ)
          # ============================================
          echo ""
          echo "🔧 Vérification de la configuration Nginx..."

          # Vérifier si Nginx est installé et actif
          if ! command -v nginx &> /dev/null; then
            echo "⚠️ Nginx n'est pas installé - passage de cette étape"
          elif ! systemctl is-active --quiet nginx; then
            echo "⚠️ Nginx n'est pas actif - tentative de démarrage..."

            # Nettoyer les fichiers de backup dans sites-enabled
            echo "🧹 Nettoyage des backups Nginx dans sites-enabled..."
            rm -f /etc/nginx/sites-enabled/*.backup* 2>/dev/null || true
            rm -f /etc/nginx/sites-available/*.backup* 2>/dev/null || true

            # Créer le dossier de backup
            mkdir -p /var/backups/nginx

            # Tester la config avant de démarrer
            if nginx -t 2>/dev/null; then
              systemctl start nginx 2>/dev/null && echo "✅ Nginx démarré avec succès" || echo "❌ Impossible de démarrer Nginx automatiquement"
            else
              echo "❌ Configuration Nginx invalide - correction manuelle requise"
              nginx -t 2>&1 | tail -5
            fi
          fi

          NGINX_CONF="/etc/nginx/sites-enabled/axontis"
          CORRECT_ROOT="/var/www/axontis/public"  # MODIFIÉ: sans /current

          if [ -f "$NGINX_CONF" ]; then
            # Vérifier si la config pointe vers le bon dossier
            CURRENT_ROOT=$(grep -E "^\s*root\s+" "$NGINX_CONF" | head -1 | awk '{print $2}' | tr -d ';')

            if [ "$CURRENT_ROOT" = "$CORRECT_ROOT" ]; then
              echo "✅ Nginx pointe déjà vers $CORRECT_ROOT"
            else
              echo "⚠️ Nginx pointe vers $CURRENT_ROOT au lieu de $CORRECT_ROOT"
              echo "   Correction en cours..."

              # Backup dans /var/backups (PAS dans sites-enabled)
              mkdir -p /var/backups/nginx
              cp "$NGINX_CONF" "/var/backups/nginx/axontis.backup.$(date +%Y%m%d_%H%M%S)"

              # Corriger le root path
              sed -i "s|root /var/www/axontis/current/public;|root /var/www/axontis/public;|g" "$NGINX_CONF"
              sed -i "s|root /var/www/axontis;|root /var/www/axontis/public;|g" "$NGINX_CONF"

              # Tester la config
              if nginx -t 2>/dev/null; then
                # Vérifier si Nginx est actif avant de reload
                if systemctl is-active --quiet nginx; then
                  systemctl reload nginx
                  echo "✅ Configuration Nginx corrigée et rechargée"
                else
                  echo "⚠️ Configuration Nginx corrigée mais Nginx n'est pas actif"
                  echo "   Démarrez Nginx manuellement: sudo systemctl start nginx"
                fi
              else
                echo "❌ Erreur dans la configuration Nginx après correction"
                echo "   Restauration du backup..."
                cp "/var/backups/nginx/axontis.backup."* "$NGINX_CONF" 2>/dev/null | tail -1 || true
                echo "   Correction manuelle requise"
              fi
            fi
          else
            echo "⚠️ Fichier de configuration Nginx non trouvé à $NGINX_CONF"
            echo "   Veuillez créer la configuration manuellement avec:"
            echo "   root /var/www/axontis/public;"
            echo ""
            echo "   Voir la documentation pour la configuration complète"
          fi

          # ============================================
          # 14. VÉRIFICATION FINALE
          # ============================================
          echo ""
          echo "🔍 Vérification finale..."

          # Test HTTP
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://axontis.net/)
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "✅ Application accessible (HTTP $HTTP_CODE)"
          else
            echo "⚠️ L'application répond avec HTTP $HTTP_CODE"
          fi

          # Test de la configuration mail
          echo ""
          echo "🔍 Test de la configuration mail..."
          echo ""
          echo "🔍 Debug: .env file MAIL_ values:"
          grep "^MAIL_" $CURRENT_LINK/.env || echo "   No MAIL_ variables in .env"
          echo ""
          cd $CURRENT_LINK
          php artisan tinker --execute="
            echo '🔍 Debug: Laravel config values:' . PHP_EOL;
            echo '   mail.default: ' . var_export(config('mail.default'), true) . PHP_EOL;
            echo '   mail.mailers: ' . var_export(array_keys(config('mail.mailers', [])), true) . PHP_EOL;
            echo '' . PHP_EOL;
            echo '🔍 Debug: Environment variables:' . PHP_EOL;
            echo '   MAIL_MAILER env: ' . var_export(env('MAIL_MAILER'), true) . PHP_EOL;
            echo '   MAIL_HOST env: ' . var_export(env('MAIL_HOST'), true) . PHP_EOL;
            echo '' . PHP_EOL;

            \$mailer = config('mail.default');
            if (empty(\$mailer)) {
              echo '❌ ERREUR: MAIL_MAILER est vide' . PHP_EOL;
              echo '   Ceci indique que config(\"mail.default\") retourne null/empty' . PHP_EOL;
              exit(1);
            } else {
              echo '✅ MAIL_MAILER configuré: ' . \$mailer . PHP_EOL;
            }
          "

          # Vérifier Horizon
          echo ""
          echo "🔍 Vérification de Horizon..."
          HORIZON_RUNNING=$(supervisorctl status axontis-horizon 2>/dev/null | grep -c "RUNNING" || echo "0")
          if [ "$HORIZON_RUNNING" -gt 0 ] 2>/dev/null; then
            echo "✅ Horizon actif (gère tous les workers automatiquement)"
            cd $CURRENT_LINK && php artisan horizon:status 2>/dev/null || true
          else
            echo "⚠️ Horizon n'est pas encore actif"
            echo "   → Vérifiez la config Supervisor : /etc/supervisor/conf.d/axontis-horizon.conf"
            echo "   → Commandes : sudo supervisorctl reread && sudo supervisorctl update && sudo supervisorctl start axontis-horizon"
          fi

          # Vérifier Reverb
          echo ""
          echo "🔍 Vérification de Reverb (WebSocket)..."
          REVERB_RUNNING=$(supervisorctl status axontis-reverb 2>/dev/null | grep -c "RUNNING" || echo "0")
          if [ "$REVERB_RUNNING" -gt 0 ] 2>/dev/null; then
            echo "✅ Reverb actif (WebSocket broadcasting pour alarmes)"
          else
            echo "⚠️ Reverb n'est pas actif"
            echo "   → Copiez infrastructure/scripts/axontis-reverb.conf dans /etc/supervisor/conf.d/"
            echo "   → Commandes : sudo supervisorctl reread && sudo supervisorctl update && sudo supervisorctl start axontis-reverb"
          fi

          echo ""
          echo "=========================================="
          echo "🎉 DÉPLOIEMENT TERMINÉ - ZERO DOWNTIME!"
          echo "📌 Release: $TIMESTAMP"
          echo "=========================================="

          DEPLOY_SCRIPT

  # =============================================================================
  # Job 2: Notify (optionnel)
  # =============================================================================
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: 📊 Deployment Status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Déploiement réussi sur Vultr VPS (Zero Downtime)"
          else
            echo "❌ Échec du déploiement"
            exit 1
          fi
